# MQTT Access Control List (ACL) - Mosquitto
# Define permissions for each client/device

# Default rules
user default
topic read $SYS/#
topic deny #

# ==================== DEVICES ====================

# Device 001 - Can publish sensor data
user device001
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE001/data/#
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE001/status
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE001/response
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE001/heartbeat
topic read landslide/project/PRJ001/site/SITE01/device/DEVICE001/command
topic read landslide/project/PRJ001/site/SITE01/device/DEVICE001/config

# Device 002
user device002
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE002/data/#
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE002/status
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE002/response
topic write landslide/project/PRJ001/site/SITE01/device/DEVICE002/heartbeat
topic read landslide/project/PRJ001/site/SITE01/device/DEVICE002/command
topic read landslide/project/PRJ001/site/SITE01/device/DEVICE002/config

# Device 003
user device003
topic write landslide/project/PRJ001/site/SITE02/device/DEVICE003/data/#
topic write landslide/project/PRJ001/site/SITE02/device/DEVICE003/status
topic write landslide/project/PRJ001/site/SITE02/device/DEVICE003/response
topic write landslide/project/PRJ001/site/SITE02/device/DEVICE003/heartbeat
topic read landslide/project/PRJ001/site/SITE02/device/DEVICE003/command
topic read landslide/project/PRJ001/site/SITE02/device/DEVICE003/config

# ==================== SERVER (Backend) ====================

# Server - Can subscribe to all device data
user server
topic read landslide/project/PRJ001/+/device/+/data/#
topic read landslide/project/PRJ001/+/device/+/status
topic read landslide/project/PRJ001/+/device/+/heartbeat
topic write landslide/project/PRJ001/+/device/+/command
topic write landslide/project/PRJ001/+/device/+/config
topic write landslide/project/PRJ001/alerts/#
topic read landslide/project/PRJ001/alerts/#

# ==================== ADMIN ====================

# Admin - Full access
user admin
topic write #
topic read #

# ==================================================
# ACL Notes:
# 
# topic read:   Client can subscribe to this topic
# topic write:  Client can publish to this topic
# topic deny:   Explicitly deny access to this topic
#
# Wildcards:
# +     = Single level wildcard (e.g., device/+/data matches device/001/data)
# #     = Multi-level wildcard (e.g., device/# matches device/001/data/temp)
# $SYS  = System topics (broker status, statistics)
#
# Usage:
# mosquitto_sub -h localhost -u device001 -P password -t "topic"
# mosquitto_pub -h localhost -u device001 -P password -t "topic" -m "message"
